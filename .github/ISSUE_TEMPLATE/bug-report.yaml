name: Bug report
description: Report something that does not work as expected
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug!

        Please fill out every field below as completely as possible. Issues with missing or incomplete information will be closed without comment; repeatedly opening such issues may result in a block.
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I searched the existing issues (both open and closed) and did not find a duplicate.
          required: true
        - label: I followed the instructions in the [README](https://github.com/mserajnik/tortoise-deploy#readme) and checked the _[Breaking changes](https://github.com/mserajnik/tortoise-deploy#breaking-changes)_ section.
          required: true
        - label: I can reproduce the problem with the latest images (after pulling them and re-creating the containers).
          required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the observed behavior and what you expected to happen instead.
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: host-system
    attributes:
      label: Host system
      description: The operating system (and, if applicable, distribution) that runs Docker.
      placeholder: e.g., Debian 13, macOS 26, Windows 11 with WSL2 (Ubuntu 24.04)
    validations:
      required: true
  - type: dropdown
    id: architecture
    attributes:
      label: Architecture
      options:
        - amd64
        - arm64
    validations:
      required: true
  - type: dropdown
    id: channel
    attributes:
      label: Image channel
      options:
        - stable
        - unstable
    validations:
      required: true
  - type: textarea
    id: docker-environment
    attributes:
      label: Docker environment
      description: The output of `docker version` and `docker compose version`, plus whether you use Docker Desktop, a native Docker Engine or a rootless setup.
      render: text
    validations:
      required: true
  - type: textarea
    id: image-versions
    attributes:
      label: Image versions
      description: |
        The output of the following commands (replace `<channel>` with the image channel you use):

        ```sh
        docker compose images
        docker image inspect --format '{{ json .Config.Labels }}' ghcr.io/mserajnik/tortoise-server:<channel>
        docker image inspect --format '{{ json .Config.Labels }}' ghcr.io/mserajnik/tortoise-database:<channel>
        ```
      render: text
    validations:
      required: true
  - type: textarea
    id: compose-configuration
    attributes:
      label: Compose configuration
      description: Your full `compose.yaml`. Make sure to redact any secrets or sensitive information.
      render: yaml
    validations:
      required: true
  - type: textarea
    id: configuration-changes
    attributes:
      label: Configuration changes
      description: Any changes you made to the configuration files in `config/` and any custom SQL files you use. Write "None" if you run an unmodified setup.
    validations:
      required: true
  - type: textarea
    id: log-output
    attributes:
      label: Log output
      description: The relevant output of `docker compose logs`. Include the full startup output of the affected service if the problem occurs during startup.
      render: text
    validations:
      required: true
  - type: textarea
    id: file-permissions
    attributes:
      label: File permissions
      description: |
        The output of the following command, run from your tortoise-deploy directory. On Linux and macOS (and inside WSL2, if your setup lives on the WSL2 file system):

        ```sh
        find . \( -name .git -o -name client-data -o -name extracted-data \) -prune -o -print0 | xargs -0 ls -ld
        ```

        On Windows, if your setup lives on the Windows file system (PowerShell):

        ```powershell
        Get-ChildItem -Recurse -Depth 4 | Format-Table Mode, FullName -AutoSize
        ```
      render: text
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Anything else that might be relevant.
    validations:
      required: false
  - type: checkboxes
    id: sign-off
    attributes:
      label: Sign-off
      options:
        - label: I confirm that I have provided all requested information completely and truthfully to the best of my knowledge. I understand that issues with missing or incomplete information will be closed without comment, and that repeatedly opening such issues may result in a block.
          required: true
